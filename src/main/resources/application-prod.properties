# Server
# Railway asigna el puerto automáticamente mediante la variable PORT
server.port=${PORT}

# Database
# Usa las variables que Railway genera automáticamente al crear la DB
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
# En Railway es mejor 'update' o 'validate'. 'update' creará las tablas si no existen.
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWTs
# Es CRÍTICO que en Railway configures una JWT_SECRET distinta por seguridad
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# CORS
# Aquí debes ańadir la URL de tu frontend en Vercel (separada por coma)
cors.allowed-origins=${CORS_ALLOWED}

# Sync
coins.sync.on-startup=false